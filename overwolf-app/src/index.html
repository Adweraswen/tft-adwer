<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>TFT Adwer Bridge</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>TFT Adwer Bridge</h1>
    <div id="status" class="status disconnected">
      Overwolf başlatılıyor...
    </div>

    <div class="info">
      <div class="row">
        <span>Overwolf:</span>
        <span id="ow-version">-</span>
      </div>
      <div class="row">
        <span>Oyun:</span>
        <span id="game-status">bekleniyor</span>
      </div>
      <div class="row">
        <span>WebSocket:</span>
        <span id="ws-status">kapalı</span>
      </div>
      <div class="row">
        <span>Gönderilen event:</span>
        <span id="event-count">0</span>
      </div>
      <div class="row">
        <span>Son event:</span>
        <span id="last-event">-</span>
      </div>
    </div>

    <div class="footer">
      <p>Bu pencere TFT verilerini toplar. Kapatabilirsin, arka planda çalışmaya devam eder.</p>
    </div>
  </div>

  <script src="js/bridge.js"></script>
</body>
</html>
